<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Contato - BookHub</title>

    <!-- Estilo -->
    <link rel="stylesheet" href="../styles/style.css">

    <!-- Ícone -->
    <link rel="shortcut icon" href="assets/favicon.ico">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <a href="../index.html"> <img src="../assets/imgs/1.logo.png" alt="Logo BookHub"> BookHub</a>

            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->
            <nav class="nav">
                <a href="../index.html">Início</a>
                <a href="../pages/categories.html">Categorias</a>
                <a href="../pages/about.html">Sobre</a>
                <a href="../pages/contact.html">Contato</a>
            </nav>

        </div>
    </header>


    <!-- CONTATO -->
    <section class="books contact-section">
        <div class="container">
            <h2>Contato</h2>
            <p>Entre em contato conosco através do formulário abaixo ou pelo email: email@bookhub.com</p>
            <form action="" method="post">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="app.js"></script>

    <script>
        document.querySelector('a[href="contact.html"]').classList.add('active');
    </script>

</body>

</html>
