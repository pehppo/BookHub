<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Categorias - BookHub</title>

    <!-- Estilo -->
    <link rel="stylesheet" href="../styles/style.css">

    <!-- Ícone(s) -->
    <link rel="shortcut icon" href="../assets/favicon.ico">
    <script defer src="../js/loadSvgs.js"></script>
    <script defer src="../js/openMenu.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <a href="../index.html"> <img src="../assets/imgs/1.logo.png" alt="Logo BookHub"> BookHub</a>
            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->

            <nav class="nav">
                <div class="desktop">
                    <a href="../index.html">Início</a>
                    <a href="./categories.html">Categorias</a>
                    <a href="./about.html">Sobre</a>
                    <a href="./contact.html">Contato</a>
                </div>
                <div class="mobile">
                    <span id="menu-icon">
                        <img src="../assets/imgs/icons8-menu-3d-fluency-96.png" alt="Menu">
                    </span>
                    <div class="nav-mobile closed">
                        <div class="content">
                            <a href="../index.html">Início</a>
                            <a href="./categories.html">Categorias</a>
                            <a href="./about.html">Sobre</a>
                            <a href="./contact.html">Contato</a>
                        </div>
                    </div>
            </nav>

        </div>
    </header>

    <!-- RESULTADOS DA BUSCA -->
    <section class="books" id="searchSection" style="display: none;">
        <div class="container">
            <h2>Resultados da busca</h2>
            <div class="books-grid" id="searchResults"></div>
        </div>
    </section>

    <!-- CATEGORIAS -->
    <section class="books">
        <div class="container">
            <h2>Categorias</h2>
            <div class="categories-grid">
                <button class="category-btn" onclick="filterByCategory('Ação')">Ação</button>
                <button class="category-btn" onclick="filterByCategory('Aventura')">Aventura</button>
                <button class="category-btn" onclick="filterByCategory('Fantasia')">Fantasia</button>
                <button class="category-btn" onclick="filterByCategory('Romance')">Romance</button>
                <button class="category-btn" onclick="filterByCategory('Terror')">Terror</button>
                <button class="category-btn" onclick="filterByCategory('Comédia')">Comédia</button>
                <button class="category-btn" onclick="filterByCategory('Drama')">Drama</button>
                <button class="category-btn" onclick="filterByCategory('Mistério')">Mistério</button>
                <button class="category-btn" onclick="filterByCategory('Sci-Fi')">Sci-Fi</button>
            </div>
            <div class="books-grid categoryResults" id="categoryResults"></div>
        </div>
    </section>

    <!-- TODOS OS LIVROS -->
    <section class="books">
        <div class="container">
            <h2>Todos os Livros</h2>
            <div class="books-grid" id="allBooks"></div>
        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="../js/app.js"></script>

    <script>
        document.querySelector('a[href="./categories.html"]').classList.add('active');
        renderAllBooks();
    </script>

</body>

</html>
