<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/book.css">
    <!-- Ícone(s) -->
    <link rel="shortcut icon" href="../assets/favicon.ico">

    <!-- js -->
    <script defer src="../js/loadSvgs.js"></script>
    <script defer src="../js/openMenu.js"></script>
    <script defer src="../js/fixHeader.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <a href="../index.html"> <img src="../assets/imgs/1.logo.png" alt="Logo BookHub"> BookHub</a>

            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->

            <nav class="nav">
                <div class="desktop">
                    <a href="../index.html">Início</a>
                    <a href="./categories.html">Categorias</a>
                    <a href="./about.html">Sobre</a>
                    <a href="./contact.html">Contato</a>
                </div>
                <div class="mobile">
                    <span id="menu-icon">
                        <img src="../assets/imgs/icons8-menu-3d-fluency-96.png" alt="Menu">
                    </span>
                    <div class="nav-mobile closed">
                        <div class="content">
                            <a href="../index.html">Início</a>
                            <a href="./categories.html">Categorias</a>
                            <a href="./about.html">Sobre</a>
                            <a href="./contact.html">Contato</a>
                        </div>
                    </div>
            </nav>

        </div>
    </header>

    <!-- RESULTADOS DA BUSCA -->
    <section class="books" id="searchSection" style="display: none;">
        <div class="container">
            <h2>Resultados da busca</h2>
            <div class="books-grid" id="searchResults"></div>
        </div>
    </section>

    <!-- DETALHE DO LIVRO -->
    <section class="book-detail">
        <div class="container detail-content">

            <!-- Imagem -->
            <img id="book-img" src="" alt="Livro">

            <!-- Informações -->
            <div class="info">
                <h1 id="book-title"></h1>
                <p class="author">por <span id="book-author"></span></p>

                <p class="genre" id="book-genre"></p>
                <p class="rating">⭐ <span id="book-rating"></span></p>

                <p class="meta">
                    <span id="book-year"></span> •
                    <span id="book-pages"></span> páginas
                </p>

                <p class="price">R$ <span id="book-price"></span></p>

                <p class="description" id="book-description"></p>

                <!-- Botões -->
                <div class="actions">
                    <button class="btn-back" onclick="goBack()">← Voltar</button>
                    <button class="btn-buy" onclick="buyBook()">Comprar</button>
                </div>
            </div>

        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <script src="../js/app.js"></script>

    <script>
        // Pega o ID da URL
        const params = new URLSearchParams(window.location.search);
        const bookId = parseInt(params.get("id"));

        // Carrega o livro correto
        loadBook(bookId);
    </script>

</body>

</html>
