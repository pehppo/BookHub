<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Detalhes do Livro</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <img src="assets/imgs/1.logo.png" alt="Logo BookHub">
                BookHub
            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->
            <nav class="nav">
                <a href="pages/index.html">Início</a>
                <a href="pages/categories.html">Categorias</a>
                <a href="pages/about.html">Sobre</a>
                <a href="pages/contact.html">Contato</a>
            </nav>

        </div>
    </header>

    <!-- RESULTADOS DA BUSCA -->
    <section class="books" id="searchSection" style="display: none;">
        <div class="container">
            <h2>Resultados da busca</h2>
            <div class="books-grid" id="searchResults"></div>
        </div>
    </section>

    <!-- DETALHE DO LIVRO -->
    <section class="book-detail">
        <div class="container detail-content">

            <!-- Imagem -->
            <img id="book-img" src="" alt="Livro">

            <!-- Informações -->
            <div class="info">
                <h1 id="book-title"></h1>
                <p class="author">por <span id="book-author"></span></p>

                <p class="genre" id="book-genre"></p>
                <p class="rating">⭐ <span id="book-rating"></span></p>

                <p class="meta">
                    <span id="book-year"></span> •
                    <span id="book-pages"></span> páginas
                </p>

                <p class="price">R$ <span id="book-price"></span></p>

                <p class="description" id="book-description"></p>

                <!-- Botões -->
                <div class="actions">
                    <button class="btn-back" onclick="goBack()">← Voltar</button>
                    <button class="btn-buy" onclick="buyBook()">Comprar</button>
                </div>
            </div>

        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <script src="app.js"></script>

    <script>
        // Pega o ID da URL
        const params = new URLSearchParams(window.location.search);
        const bookId = parseInt(params.get("id"));

        // Carrega o livro correto
        loadBook(bookId);
    </script>

</body>
</html>
