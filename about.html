<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Sobre - BookHub</title>

    <!-- Estilo -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Ícone -->
    <link rel="shortcut icon" href="assets/favicon.ico">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <img src="assets/imgs/1.logo.png" alt="Logo BookHub">
                BookHub
            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->
            <nav class="nav">
                <a href="index.html">Início</a>
                <a href="categories.html">Categorias</a>
                <a href="about.html">Sobre</a>
                <a href="contact.html">Contato</a>
            </nav>

        </div>
    </header>

    <!-- RESULTADOS DA BUSCA -->
    <section class="books" id="searchSection" style="display: none;">
        <div class="container">
            <h2>Resultados da busca</h2>
            <div class="books-grid" id="searchResults"></div>
        </div>
    </section>

    <!-- SOBRE -->
    <section class="books">
        <div class="container">
            <h2>Sobre o BookHub</h2>
            <p>BookHub é um site dedicado aos amantes de mangás e histórias em quadrinhos. Aqui você encontra os melhores volumes das séries mais populares.</p>
        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="app.js"></script>

    <script>
        document.querySelector('a[href="about.html"]').classList.add('active');
    </script>

</body>
</html>
