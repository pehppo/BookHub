<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>BookHub</title>

    <!-- Estilo -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Ícone(s) -->
    <link rel="shortcut icon" href="assets/favicon.ico">
    <script defer src="./assets/loadSvgs.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">
                <img src="assets/imgs/1.logo.png" alt="Logo BookHub">
                BookHub
            </div>

            <!-- Busca -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar livros...">
            </div>

            <!-- Navegação -->
            <nav class="nav">
                <div class="desktop">
                    <a href="index.html">Início</a>
                    <a href="pages/categories.html">Categorias</a>
                    <a href="pages/about.html">Sobre</a>
                    <a href="pages/contact.html">Contato</a>
                </div>
                <div class="mobile">
                    <span id="menu-icon">
                        <link type="image/png" sizes="96x96" rel="icon" href=".../icons8-menu-3d-fluency-96.png">
                    </span>
                    <div class="nav-mobile closed">
                        <div class="content">
                            <a href="index.html">Início</a>
                            <a href="pages/categories.html">Categorias</a>
                            <a href="pages/about.html">Sobre</a>
                            <a href="pages/contact.html">Contato</a>
                        </div>
                    </div>
                </div>
            </nav>


        </div>
    </header>

    <!-- RESULTADOS DA BUSCA -->
    <section class="books" id="searchSection" style="display: none;">
        <div class="container">
            <h2>Resultados da busca</h2>
            <div class="books-grid" id="searchResults"></div>
        </div>
    </section>

    <!-- LANÇAMENTOS -->
    <section class="books">
        <div class="container">
            <h2>Novos Lançamentos</h2>
            <div class="books-grid" id="lancamentos"></div>
        </div>
    </section>

    <!-- POPULARES -->
    <section class="books">
        <div class="container">
            <h2>Mais Populares</h2>
            <div class="books-grid" id="populares"></div>
        </div>
    </section>

    <!-- RECOMENDADOS -->
    <section class="books">
        <div class="container">
            <h2>Recomendados para você</h2>
            <div class="books-grid" id="recomendados"></div>
        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 BookHub</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="app.js"></script>

    <script>
        document.querySelector('a[href="index.html"]').classList.add('active');
    </script>

</body>

</html>
